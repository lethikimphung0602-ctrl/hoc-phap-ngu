<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Pháp Ngữ · Polly</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0f0e17;--surface:#1a1929;--card:#211f35;--border:#2e2b4a;
    --gold:#c9a84c;--gold-dim:#7a6230;--lavender:#9b8ec4;
    --text:#ece9f5;--muted:#7a7890;--green:#4caf7d;--red:#e05c5c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);}
  .logo em{font-style:italic;color:var(--lavender);}
  .mode-tabs{display:flex;gap:6px;}
  .mode-tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.82rem;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;}
  .mode-tab.active{background:var(--gold);color:#0f0e17;border-color:var(--gold);font-weight:600;}

  .main{padding:20px 24px;max-width:820px;margin:0 auto;}

  /* FILTER ROWS */
  .filter-section{margin-bottom:18px;}
  .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
  .filter-label{font-size:0.75rem;color:var(--muted);margin-right:4px;min-width:56px;}
  .filter-btn{padding:4px 12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.75rem;cursor:pointer;transition:all 0.2s;}
  .filter-btn.active{border-color:var(--lavender);color:var(--lavender);background:rgba(155,142,196,0.1);}
  .filter-btn:hover:not(.active){border-color:var(--lavender);color:var(--text);}
  .sheet-btn{font-size:0.72rem;padding:4px 10px;}
  .count-badge{font-size:0.72rem;color:var(--muted);margin-left:auto;}

  .progress-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:6px;overflow:hidden;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--lavender));border-radius:2px;transition:width 0.4s ease;}
  .progress-info{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);margin-bottom:20px;}

  /* FLASHCARD */
  .flashcard-scene{perspective:1000px;width:100%;max-width:480px;height:240px;margin:0 auto 20px;cursor:pointer;}
  .flashcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(.4,.2,.2,1);}
  .flashcard-inner.flipped{transform:rotateY(180deg);}
  .flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;}
  .flashcard-front{background:var(--card);border:1px solid var(--border);}
  .flashcard-back{background:linear-gradient(135deg,#1d1b35 0%,#211f35 100%);border:1px solid var(--gold-dim);transform:rotateY(180deg);}
  .card-lang-tag{font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .card-word{font-family:'Playfair Display',serif;font-size:2rem;color:var(--text);margin-bottom:6px;line-height:1.2;}
  .flashcard-back .card-word{color:var(--gold);}
  .card-type{font-size:0.72rem;color:var(--lavender);font-style:italic;}
  .card-sheet{font-size:0.68rem;color:var(--muted);margin-top:6px;opacity:0.7;}
  .card-example{font-size:0.8rem;color:var(--muted);font-style:italic;margin-top:8px;line-height:1.5;}
  .flip-hint{font-size:0.7rem;color:var(--muted);text-align:center;margin-bottom:14px;opacity:0.6;}
  .fc-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
  .fc-btn{padding:9px 22px;border-radius:24px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:0.84rem;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;}
  .fc-btn.wrong:hover{border-color:var(--red);color:var(--red);}
  .fc-btn.correct:hover{border-color:var(--green);color:var(--green);}

  /* MATCHING */
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .match-col{display:flex;flex-direction:column;gap:8px;}
  .match-item{padding:11px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:0.84rem;cursor:pointer;transition:all 0.2s;text-align:center;user-select:none;min-height:48px;display:flex;align-items:center;justify-content:center;line-height:1.3;}
  .match-item.selected{border-color:var(--lavender);background:rgba(155,142,196,0.15);color:var(--lavender);}
  .match-item.correct{border-color:var(--green);background:rgba(76,175,125,0.12);color:var(--green);cursor:default;}
  .match-item.wrong{border-color:var(--red);background:rgba(224,92,92,0.12);color:var(--red);}
  .match-item:hover:not(.correct){border-color:var(--lavender);}
  .match-result{text-align:center;padding:20px;background:var(--card);border-radius:14px;border:1px solid var(--border);display:none;margin-bottom:16px;}
  .match-result.show{display:block;}
  .match-score{font-size:2rem;font-weight:700;color:var(--gold);margin-bottom:6px;}
  .match-msg{color:var(--muted);font-size:0.84rem;margin-bottom:14px;}

  /* COMPLETE */
  .complete-screen{text-align:center;padding:36px 20px;display:none;}
  .complete-screen.show{display:block;}
  .complete-icon{font-size:2.8rem;margin-bottom:10px;}
  .complete-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);margin-bottom:6px;}
  .complete-msg{color:var(--muted);font-size:0.86rem;margin-bottom:18px;}
  .restart-btn{padding:10px 24px;background:var(--gold);border:none;border-radius:24px;color:#0f0e17;font-weight:700;font-size:0.86rem;cursor:pointer;font-family:'Inter',sans-serif;}

  /* ADD + IMPORT */
  .add-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:20px;}
  .add-title{font-size:0.8rem;font-weight:600;color:var(--gold);margin-bottom:12px;}
  .add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .add-input{flex:1;min-width:100px;padding:8px 11px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.82rem;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
  .add-input:focus{border-color:var(--gold-dim);}
  .add-input::placeholder{color:var(--muted);}
  select.add-input{max-width:150px;}
  .add-btn{padding:8px 16px;background:var(--gold);border:none;border-radius:8px;color:#0f0e17;font-weight:600;font-size:0.82rem;cursor:pointer;font-family:'Inter',sans-serif;}
  .import-btn{padding:8px 14px;background:transparent;border:1px dashed var(--gold-dim);border-radius:8px;color:var(--gold);font-size:0.82rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;}
  .import-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.08);}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;}
  .modal-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);margin-bottom:5px;}
  .modal-sub{font-size:0.76rem;color:var(--muted);margin-bottom:14px;line-height:1.5;}
  .modal-label{font-size:0.75rem;color:var(--lavender);font-weight:600;margin-bottom:5px;display:block;letter-spacing:0.05em;text-transform:uppercase;}
  .modal-select{width:100%;padding:8px 11px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.82rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:12px;}
  .col-map-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .col-map-item label{font-size:0.73rem;color:var(--muted);display:block;margin-bottom:3px;}
  .preview-table-wrap{overflow-x:auto;margin-bottom:12px;border-radius:8px;border:1px solid var(--border);}
  .preview-table{width:100%;border-collapse:collapse;font-size:0.76rem;}
  .preview-table th{background:var(--card);padding:7px 9px;text-align:left;color:var(--lavender);border-bottom:1px solid var(--border);}
  .preview-table td{padding:6px 9px;border-bottom:1px solid var(--border);color:var(--text);}
  .preview-table tr:last-child td{border-bottom:none;}
  .preview-count{font-size:0.76rem;color:var(--muted);margin-bottom:12px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;}
  .modal-cancel{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:0.82rem;cursor:pointer;font-family:'Inter',sans-serif;}
  .modal-confirm{padding:8px 18px;background:var(--gold);border:none;border-radius:8px;color:#0f0e17;font-weight:600;font-size:0.82rem;cursor:pointer;font-family:'Inter',sans-serif;}
  .modal-confirm:disabled{opacity:0.4;cursor:default;}

  .hidden{display:none!important;}
  @keyframes shake{0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}}
  .shake{animation:shake 0.3s ease;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Học Pháp Ngữ <em>· Polly</em></div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabFC" onclick="switchMode('flashcard')">🃏 Flashcard</button>
    <button class="mode-tab" id="tabMT" onclick="switchMode('match')">🔗 Nối từ</button>
  </div>
</div>

<div class="main">
  <!-- FILTER ROW 1: Category -->
  <div class="filter-section">
    <div class="filter-row">
      <span class="filter-label">📂 Chủ đề:</span>
      <button class="filter-btn active" id="catAll" onclick="setCategory('all',this)">Tất cả</button>
      <button class="filter-btn" onclick="setCategory('vie_quotidienne',this)">Đời sống</button>
      <button class="filter-btn" onclick="setCategory('verbes',this)">Động từ</button>
      <button class="filter-btn" onclick="setCategory('grammaire',this)">Ngữ pháp</button>
      <button class="filter-btn" onclick="setCategory('pronoms',this)">Đại từ</button>
      <span class="count-badge" id="countBadge"></span>
    </div>
    <!-- FILTER ROW 2: Sheet -->
    <div class="filter-row" id="sheetRow">
      <span class="filter-label">📖 Sheet:</span>
      <button class="filter-btn sheet-btn active" id="sheetAll" onclick="setSheet('all',this)">Tất cả</button>
      <button class="filter-btn sheet-btn" onclick="setSheet('1.Salutations',this)">Chào hỏi</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('2.Famille',this)">Gia đình</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('3.Nourriture',this)">Ẩm thực</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('4.Vetements',this)">Trang phục</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('5.Corps_Sante',this)">Cơ thể & Sức khoẻ</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('6.Professions',this)">Nghề nghiệp</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('7.Logement',this)">Nhà ở</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('8.Ville_Transport',this)">Thành phố & Giao thông</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('9.Temps_Meteo',this)">Thời gian & Thời tiết</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('10.Loisirs_Verbes',this)">Giải trí & Động từ</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('11.Pays',this)">Quốc gia</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('12.Description',this)">Mô tả</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('13.Quantites',this)">Số lượng</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('14.Evenements_Opinion',this)">Sự kiện & Ý kiến</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('15.Mots_utiles',this)">Từ hữu ích</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('16.Expressions_Verbes',this)">Cụm động từ</button>
    <button class="filter-btn sheet-btn" onclick="setSheet('17.Expressions_Comm',this)">Giao tiếp</button>
    
    </div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="progress-info"><span id="progressText">0 / 0</span><span id="scoreText"></span></div>

  <!-- FLASHCARD MODE -->
  <div id="flashcardMode">
    <div class="flashcard-scene" onclick="flipCard()">
      <div class="flashcard-inner" id="cardInner">
        <div class="flashcard-face flashcard-front">
          <div class="card-lang-tag">🇫🇷 Tiếng Pháp</div>
          <div class="card-word" id="cardFR">—</div>
          <div class="card-type" id="cardType"></div>
          <div class="card-sheet" id="cardSheet"></div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="card-lang-tag">🇻🇳 Tiếng Việt</div>
          <div class="card-word" id="cardVI">—</div>
          <div class="card-example" id="cardExample"></div>
        </div>
      </div>
    </div>
    <p class="flip-hint">👆 Nhấn vào thẻ để lật · Space = lật · → = Đã nhớ · ← = Chưa nhớ</p>
    <div class="fc-actions" id="fcActions">
      <button class="fc-btn wrong" onclick="markCard(false)">✗ Chưa nhớ</button>
      <button class="fc-btn correct" onclick="markCard(true)">✓ Đã nhớ</button>
    </div>
    <div class="complete-screen" id="fcComplete">
      <div class="complete-icon">🎉</div>
      <div class="complete-title">Bravo, Polly!</div>
      <div class="complete-msg" id="fcMsg"></div>
      <button class="restart-btn" onclick="startFlashcard()">Ôn lại từ đầu</button>
    </div>
  </div>

  <!-- MATCHING MODE -->
  <div id="matchMode" class="hidden">
    <div class="match-grid">
      <div class="match-col" id="matchLeft"></div>
      <div class="match-col" id="matchRight"></div>
    </div>
    <div class="match-result" id="matchResult">
      <div class="match-score" id="matchScore"></div>
      <div class="match-msg" id="matchMsg"></div>
      <button class="restart-btn" onclick="startMatch()">Chơi lại 🔄</button>
    </div>
  </div>

  <!-- ADD + IMPORT -->
  <div class="add-section">
    <div class="add-title">➕ Thêm từ của bạn</div>
    <div class="add-row">
      <input class="add-input" id="newFR" placeholder="Tiếng Pháp" />
      <input class="add-input" id="newVI" placeholder="Tiếng Việt" />
      <input class="add-input" id="newType" placeholder="Loại từ" style="max-width:90px"/>
    </div>
    <div class="add-row">
      <select class="add-input" id="newCat">
        <option value="vie_quotidienne">Đời sống</option>
        <option value="pronoms">Đại từ</option>
        <option value="verbes">Động từ</option>
        <option value="grammaire">Ngữ pháp</option>
      </select>
      <input class="add-input" id="newEx" placeholder="Ví dụ câu (tuỳ chọn)" />
      <button class="add-btn" id="addBtn" onclick="addCard()">Thêm từ</button>
    </div>
    <div class="add-row" style="margin-bottom:0;margin-top:4px;">
      <button class="import-btn" onclick="document.getElementById('xlsxFile').click()">📥 Import từ Excel (.xlsx)</button>
      <input type="file" id="xlsxFile" accept=".xlsx,.xls" style="display:none" onchange="onFileSelected(event)"/>
      <span id="importStatus" style="font-size:0.76rem;color:var(--muted);align-self:center;"></span>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">📥 Import từ Excel</div>
    <div class="modal-sub">Chọn sheet và ghép cột tương ứng. Preview 5 dòng đầu để kiểm tra.</div>
    <label class="modal-label">Chọn sheet</label>
    <select class="modal-select" id="sheetSelect" onchange="onSheetChange()"></select>
    <div class="col-map-grid">
      <div class="col-map-item"><label>Cột Tiếng Pháp 🇫🇷</label><select class="modal-select" id="colFR" style="margin-bottom:0" onchange="renderPreview()"></select></div>
      <div class="col-map-item"><label>Cột Tiếng Việt 🇻🇳</label><select class="modal-select" id="colVI" style="margin-bottom:0" onchange="renderPreview()"></select></div>
      <div class="col-map-item"><label>Loại từ (tuỳ chọn)</label><select class="modal-select" id="colType" style="margin-bottom:0" onchange="renderPreview()"></select></div>
      <div class="col-map-item"><label>Ví dụ câu (tuỳ chọn)</label><select class="modal-select" id="colEx" style="margin-bottom:0" onchange="renderPreview()"></select></div>
    </div>
    <div class="preview-count" id="previewCount"></div>
    <div class="preview-table-wrap"><table class="preview-table" id="previewTable"></table></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Huỷ</button>
      <button class="modal-confirm" id="confirmImport" onclick="doImport()">Import tất cả</button>
    </div>
  </div>
</div>

<script>

": "Giao tiếp"}, {"fr": "au-dessus de", "vi": "phía trên", "type": "", "cat": "vie_quotidienne", "ex": "", "sheet": "17.Expressions_Comm", "sheetLabel": "Giao tiếp"}, {"fr": "en bas / en haut", "vi": "dưới / trên", "type": "", "cat": "vie_quotidienne", "ex": "", "sheet": "17.Expressions_Comm", "sheetLabel": "Giao tiếp"}, {"fr": "près de / loin de", "vi": "gần / xa", "type": "", "cat": "vie_quotidienne", "ex": "", "sheet": "17.Expressions_Comm", "sheetLabel": "Giao tiếp"}, {"fr": "au milieu de", "vi": "ở giữa", "type": "", "cat": "vie_quotidienne", "ex": "", "sheet": "17.Expressions_Comm", "sheetLabel": "Giao tiếp"}, {"fr": "se lever", "vi": "thức dậy", "type": "", "cat": "vie_quotidienne", "ex": "", "sheet": "17.Expressions_Comm", "sheetLabel": "Giao tiếp"}, {"fr": "se laver", "vi": "rửa, tắm", "type": "", "cat": "vie_quotidienne", "ex": "", "sheet": "17.Expressions_Comm", "sheetLabel": "Giao tiếp"}, {"fr": "s'habiller", "vi": "mặc quần áo", "type": "", "cat": "vie_quotidienne", "ex": "", "sheet": "17.Expressions_Comm", "sheetLabel": "Giao tiếp"}, {"fr": "se coucher", "vi": "đi ngủ", "type": "", "cat": "vie_quotidienne", "ex": "", "sheet": "17.Expressions_Comm", "sheetLabel": "Giao tiếp"}, {"fr": "se dépêcher", "vi": "vội vàng", "type": "", "cat": "vie_quotidienne", "ex": "", "sheet": "17.Expressions_Comm", "sheetLabel": "Giao tiếp"}];

// Default manual cards (grammar focus)
const manualDefaults = [
  {fr:"en",vi:"của nó / một số",type:"pron.",cat:"pronoms",ex:"J'en veux deux. — Tôi muốn hai cái.",sheet:"",sheetLabel:"Thêm tay"},
  {fr:"y",vi:"ở đó / đến đó",type:"pron.",cat:"pronoms",ex:"J'y vais demain. — Tôi đến đó ngày mai.",sheet:"",sheetLabel:"Thêm tay"},
  {fr:"le / la / les",vi:"anh ấy / cô ấy / chúng (COD)",type:"pron. COD",cat:"pronoms",ex:"Je le mange. — Tôi ăn nó.",sheet:"",sheetLabel:"Thêm tay"},
  {fr:"lui / leur",vi:"cho anh ấy / cho họ (COI)",type:"pron. COI",cat:"pronoms",ex:"Je lui parle. — Tôi nói chuyện với anh ấy.",sheet:"",sheetLabel:"Thêm tay"},
  {fr:"ne ... pas",vi:"không (phủ định)",type:"adv. nég.",cat:"grammaire",ex:"Je ne sais pas. — Tôi không biết.",sheet:"",sheetLabel:"Thêm tay"},
  {fr:"parce que",vi:"bởi vì / vì",type:"conj.",cat:"grammaire",ex:"Je reste parce que je suis fatigué.",sheet:"",sheetLabel:"Thêm tay"},
  {fr:"mais",vi:"nhưng",type:"conj.",cat:"grammaire",ex:"C'est cher mais beau.",sheet:"",sheetLabel:"Thêm tay"},
  {fr:"donc",vi:"vì vậy / vậy thì",type:"conj.",cat:"grammaire",ex:"J'ai faim, donc je mange.",sheet:"",sheetLabel:"Thêm tay"},
];

let allCards = [];
let filteredCards = [];
let currentCategory = 'all';
let currentSheet = 'all';
let currentMode = 'flashcard';
let fcQueue=[], fcIndex=0, fcCorrect=0, fcWrong=0, isFlipped=false;
let matchSelected=null, matchCorrect=0, matchTotal=0;
let xlsxWorkbook=null, xlsxSheetData=[];

function saveCards() {
  try { localStorage.setItem('polly_french_v2', JSON.stringify(allCards.filter(c=>c.sheet===''||c.sheetLabel==='Thêm tay'))); } catch(e){}
}
function loadCards() {
  allCards = [...builtinCards, ...manualDefaults];
  try {
    const s = localStorage.getItem('polly_french_v2');
    if (s) {
      const extra = JSON.parse(s);
      // Add only truly custom (not in builtin)
      extra.forEach(c => {
        if (!allCards.some(x=>x.fr===c.fr&&x.vi===c.vi)) allCards.push(c);
      });
    }
  } catch(e){}
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function applyFilters() {
  filteredCards = allCards.filter(c => {
    const catOk = currentCategory==='all' || c.cat===currentCategory;
    const sheetOk = currentSheet==='all' || c.sheet===currentSheet || (currentSheet==='custom'&&!c.sheet);
    return catOk && sheetOk;
  });
  shuffle(filteredCards);
  document.getElementById('countBadge').textContent = filteredCards.length+' từ';
  if(currentMode==='flashcard') startFlashcard(); else startMatch();
}

function setCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.filter-row:first-child .filter-btn:not(.sheet-btn)').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  applyFilters();
}

function setSheet(sheet, btn) {
  currentSheet = sheet;
  document.querySelectorAll('.sheet-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  applyFilters();
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabFC').classList.toggle('active',mode==='flashcard');
  document.getElementById('tabMT').classList.toggle('active',mode==='match');
  document.getElementById('flashcardMode').classList.toggle('hidden',mode!=='flashcard');
  document.getElementById('matchMode').classList.toggle('hidden',mode!=='match');
  applyFilters();
}

// FLASHCARD
function startFlashcard() {
  fcQueue=[...filteredCards]; shuffle(fcQueue);
  fcIndex=0;fcCorrect=0;fcWrong=0;isFlipped=false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('fcComplete').classList.remove('show');
  document.getElementById('fcActions').style.display='';
  updateProgressFC(); showCard();
}
function showCard() {
  if(fcIndex>=fcQueue.length){showFCDone();return;}
  const c=fcQueue[fcIndex];
  document.getElementById('cardFR').textContent=c.fr;
  document.getElementById('cardType').textContent=c.type||'';
  document.getElementById('cardSheet').textContent=c.sheetLabel||'';
  document.getElementById('cardVI').textContent=c.vi;
  document.getElementById('cardExample').textContent=c.ex||'';
  isFlipped=false; document.getElementById('cardInner').classList.remove('flipped');
  updateProgressFC();
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('cardInner').classList.toggle('flipped',isFlipped);}
function markCard(ok){if(ok)fcCorrect++;else{fcWrong++;fcQueue.push(fcQueue[fcIndex]);}fcIndex++;showCard();}
function showFCDone(){
  document.getElementById('fcActions').style.display='none';
  document.getElementById('fcComplete').classList.add('show');
  const pct=Math.round(fcCorrect/(fcCorrect+fcWrong)*100);
  document.getElementById('fcMsg').textContent=`Đã nhớ đúng ${fcCorrect}/${fcCorrect+fcWrong} (${pct}%) 🌟`;
}
function updateProgressFC(){
  const total=filteredCards.length,done=Math.min(fcIndex,total),pct=total>0?Math.round(done/total*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=done+' / '+total;
  document.getElementById('scoreText').textContent='✓ '+fcCorrect+'  ✗ '+fcWrong;
}

// MATCHING
function startMatch(){
  const pool=filteredCards.length>6?filteredCards.slice(0,6):[...filteredCards];
  matchTotal=pool.length; matchCorrect=0; matchSelected=null;
  if(pool.length<2){document.getElementById('matchLeft').innerHTML='<div style="color:var(--muted);padding:16px;text-align:center">Cần ít nhất 2 từ.</div>';document.getElementById('matchRight').innerHTML='';return;}
  const lItems=pool.map((c,i)=>({id:i,text:c.fr,side:'fr',pair:i}));
  const rItems=pool.map((c,i)=>({id:i,text:c.vi,side:'vi',pair:i})); shuffle(rItems);
  const lEl=document.getElementById('matchLeft'),rEl=document.getElementById('matchRight');
  lEl.innerHTML='';rEl.innerHTML='';document.getElementById('matchResult').classList.remove('show');
  lItems.forEach(item=>{const d=document.createElement('div');d.className='match-item';d.textContent=item.text;d.dataset.pair=item.pair;d.dataset.side='fr';d.onclick=()=>onMatchClick(d);lEl.appendChild(d);});
  rItems.forEach(item=>{const d=document.createElement('div');d.className='match-item';d.textContent=item.text;d.dataset.pair=item.pair;d.dataset.side='vi';d.onclick=()=>onMatchClick(d);rEl.appendChild(d);});
  updateProgressMatch();
}
function onMatchClick(el){
  if(el.classList.contains('correct'))return;
  if(!matchSelected){el.classList.add('selected');matchSelected=el;}
  else{
    if(matchSelected===el){el.classList.remove('selected');matchSelected=null;return;}
    if(matchSelected.dataset.side===el.dataset.side){matchSelected.classList.remove('selected');el.classList.add('selected');matchSelected=el;return;}
    if(matchSelected.dataset.pair===el.dataset.pair){
      matchSelected.classList.remove('selected');matchSelected.classList.add('correct');el.classList.add('correct');
      matchCorrect++;matchSelected=null;updateProgressMatch();
      if(matchCorrect===matchTotal)setTimeout(()=>{document.getElementById('matchScore').textContent=matchCorrect+'/'+matchTotal+' ✓';document.getElementById('matchMsg').textContent='Tất cả đã khớp! Bravo! 🎊';document.getElementById('matchResult').classList.add('show');},400);
    }else{
      matchSelected.classList.add('wrong');el.classList.add('wrong');
      const a=matchSelected,b=el;setTimeout(()=>{a.classList.remove('selected','wrong');b.classList.remove('selected','wrong');},600);matchSelected=null;
    }
  }
}
function updateProgressMatch(){
  const pct=matchTotal>0?Math.round(matchCorrect/matchTotal*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=matchCorrect+' / '+matchTotal+' cặp';
  document.getElementById('scoreText').textContent='';
}

// ADD CARD
function addCard(){
  const fr=document.getElementById('newFR').value.trim();
  const vi=document.getElementById('newVI').value.trim();
  if(!fr||!vi){alert('Vui lòng điền tiếng Pháp và tiếng Việt!');return;}
  const type=document.getElementById('newType').value.trim();
  const cat=document.getElementById('newCat').value;
  const ex=document.getElementById('newEx').value.trim();
  allCards.push({fr,vi,type,cat,ex,sheet:'',sheetLabel:'Thêm tay'});
  saveCards();
  ['newFR','newVI','newType','newEx'].forEach(id=>document.getElementById(id).value='');
  applyFilters();
  const btn=document.getElementById('addBtn');btn.textContent='✓ Đã thêm!';setTimeout(()=>btn.textContent='Thêm từ',1500);
}

// EXCEL IMPORT
function onFileSelected(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{xlsxWorkbook=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});openModal();}
    catch(err){alert('Không đọc được file. Vui lòng thử lại.');}
  };
  reader.readAsArrayBuffer(file); e.target.value='';
}
function openModal(){
  const sel=document.getElementById('sheetSelect'); sel.innerHTML='';
  xlsxWorkbook.SheetNames.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
  document.getElementById('importModal').classList.add('show'); onSheetChange();
}
function closeModal(){document.getElementById('importModal').classList.remove('show');xlsxWorkbook=null;xlsxSheetData=[];}
function onSheetChange(){
  const name=document.getElementById('sheetSelect').value;
  const sheet=xlsxWorkbook.Sheets[name];
  xlsxSheetData=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
  let headers=[];
  for(let i=0;i<Math.min(5,xlsxSheetData.length);i++){if(xlsxSheetData[i].some(c=>c!=='')){headers=xlsxSheetData[i].map(String);break;}}
  const defs={colFR:null,colVI:null,colType:null,colEx:null};
  headers.forEach((h,i)=>{
    const l=h.toLowerCase();
    if(defs.colFR===null&&(l.includes('français')||l.includes('french')||l==='fr'||l==='mot'||l.includes('pháp')))defs.colFR=i;
    if(defs.colVI===null&&(l.includes('việt')||l.includes('viet')||l==='vi'||l.includes('nghĩa')||l.includes('traduction')))defs.colVI=i;
    if(defs.colType===null&&(l.includes('genre')||l.includes('type')||l.includes('loại')||l==='pos'))defs.colType=i;
    if(defs.colEx===null&&(l.includes('exemple')||l.includes('ví dụ')||l.includes('example')))defs.colEx=i;
  });
  ['colFR','colVI','colType','colEx'].forEach((id,idx)=>{
    const s=document.getElementById(id); s.innerHTML='<option value="">— Bỏ qua —</option>';
    headers.forEach((h,i)=>{const o=document.createElement('option');o.value=i;o.textContent=h||'Cột '+(i+1);s.appendChild(o);});
    const dv=[defs.colFR,defs.colVI,defs.colType,defs.colEx][idx];
    if(dv!==null)s.value=dv;
  });
  renderPreview();
}
function getDataRows(){if(xlsxSheetData.length<2)return[];return xlsxSheetData.slice(1).filter(r=>r.some(c=>String(c).trim()!==''));}
function renderPreview(){
  const cFR=document.getElementById('colFR').value,cVI=document.getElementById('colVI').value;
  const rows=getDataRows(),preview=rows.slice(0,5),total=rows.length;
  document.getElementById('previewCount').textContent='Tổng: '+total+' từ sẽ được import';
  document.getElementById('confirmImport').disabled=(!cFR&&cFR!=='0')||(!cVI&&cVI!=='0')||total===0;
  const t=document.getElementById('previewTable');t.innerHTML='';
  const th=document.createElement('thead');th.innerHTML='<tr><th>🇫🇷 Tiếng Pháp</th><th>🇻🇳 Tiếng Việt</th><th>Loại từ</th><th>Ví dụ</th></tr>';t.appendChild(th);
  const tb=document.createElement('tbody');
  preview.forEach(row=>{
    const tr=document.createElement('tr');
    ['colFR','colVI','colType','colEx'].forEach(id=>{const td=document.createElement('td');const v=document.getElementById(id).value;td.textContent=v!==''?String(row[v]||''):'—';tr.appendChild(td);});
    tb.appendChild(tr);
  });
  t.appendChild(tb);
}
function doImport(){
  const cFR=document.getElementById('colFR').value,cVI=document.getElementById('colVI').value;
  const cType=document.getElementById('colType').value,cEx=document.getElementById('colEx').value;
  const rows=getDataRows(); let added=0,skipped=0;
  rows.forEach(row=>{
    const fr=String(row[cFR]||'').trim(),vi=String(row[cVI]||'').trim();
    if(!fr||!vi){skipped++;return;}
    if(allCards.some(c=>c.fr===fr&&c.vi===vi)){skipped++;return;}
    const type=cType!==''?String(row[cType]||'').trim():'';
    const ex=cEx!==''?String(row[cEx]||'').trim():'';
    allCards.push({fr,vi,type,cat:'vie_quotidienne',ex,sheet:'',sheetLabel:'Import'});
    added++;
  });
  saveCards(); closeModal(); applyFilters();
  const st=document.getElementById('importStatus');
  st.textContent='✓ Đã thêm '+added+' từ'+(skipped>0?' (bỏ qua '+skipped+' trùng/rỗng)':'');
  setTimeout(()=>st.textContent='',4000);
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(currentMode!=='flashcard')return;
  if(e.code==='Space'){e.preventDefault();flipCard();}
  if(e.code==='ArrowRight')markCard(true);
  if(e.code==='ArrowLeft')markCard(false);
});

// Init
loadCards();
applyFilters();
</script>
